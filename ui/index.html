<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipType</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Clipboard Typing Utility</p>
          <h1>ClipType</h1>
        </div>
        <label class="switch-row" title="开启后全局快捷键会触发输入">
          <span>启用</span>
          <input id="enabled" type="checkbox" />
          <span class="switch" aria-hidden="true"></span>
        </label>
      </header>

      <section class="status-band" aria-live="polite">
        <div>
          <span class="label">权限</span>
          <strong id="permissionText">检查中</strong>
        </div>
        <div>
          <span class="label">快捷键</span>
          <strong id="hotkeyText">-</strong>
        </div>
        <div>
          <span class="label">最近结果</span>
          <strong id="lastResultText">暂无</strong>
        </div>
      </section>

      <section class="settings-grid">
        <div class="field-group">
          <div class="field-title">
            <div>
              <h2>快捷键</h2>
              <p>按下全局快捷键后，应用会读取当前剪贴板并输入到焦点窗口。</p>
            </div>
            <button id="captureHotkey" class="icon-button" title="录制快捷键" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm0 2v12h14V6H5Zm2 3h2v2H7V9Zm4 0h2v2h-2V9Zm4 0h2v2h-2V9Zm-8 4h10v2H7v-2Z" />
              </svg>
              <span>录制</span>
            </button>
          </div>
          <input id="hotkey" class="text-input" type="text" spellcheck="false" />
          <p id="captureHint" class="hint">示例：CommandOrControl+Shift+V</p>
        </div>

        <div class="field-group">
          <div class="field-title">
            <div>
              <h2>输入速度</h2>
              <p>逐字符输入的间隔，数值越大越慢，适合不稳定的远程桌面或网页表单。</p>
            </div>
            <output id="delayValue" for="delayRange delayNumber">8 ms</output>
          </div>
          <div class="speed-row">
            <input id="delayRange" type="range" min="0" max="200" step="1" />
            <input id="delayNumber" class="number-input" type="number" min="0" max="1000" step="1" />
          </div>
        </div>

        <div class="field-group compact">
          <label class="check-row">
            <input id="appendEnter" type="checkbox" />
            <span class="checkmark" aria-hidden="true"></span>
            <span>输入结束后追加回车</span>
          </label>
        </div>

        <div class="actions">
          <button id="save" class="primary-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M17 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7l-4-4ZM5 5h10.2L19 8.8V19H5V5Zm3 2h7v4H8V7Zm0 8h8v2H8v-2Z" />
            </svg>
            <span>保存设置</span>
          </button>
          <button id="typeNow" class="secondary-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 5h16v10H4V5Zm0 12h16v2H4v-2Zm2-10v6h12V7H6Zm2 2h2v2H8V9Zm4 0h4v2h-4V9Z" />
            </svg>
            <span>立即输入</span>
          </button>
          <button id="permissions" class="secondary-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2 4 5v6c0 5 3.4 9.7 8 11 4.6-1.3 8-6 8-11V5l-8-3Zm0 2.2L18 6v5c0 3.9-2.5 7.7-6 8.8-3.5-1.1-6-4.9-6-8.8V6l6-1.8Zm-1 4.8h2v2h-2V9Zm0 4h2v5h-2v-5Z" />
            </svg>
            <span>权限设置</span>
          </button>
        </div>
      </section>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
